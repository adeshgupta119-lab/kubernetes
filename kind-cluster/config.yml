# kind-cluster.yaml

kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4

nodes:

# ==========================================
# Master / Control Plane Node
# ==========================================
- role: control-plane

  extraPortMappings:

    # HTTP
    - containerPort: 80
      hostPort: 80
      protocol: TCP

    # HTTPS
    - containerPort: 443
      hostPort: 443
      protocol: TCP

    # NodePort Example
    - containerPort: 30000
      hostPort: 30000
      protocol: TCP

    - containerPort: 30001
      hostPort: 30001
      protocol: TCP

# ==========================================
# Worker Node 1
# ==========================================
- role: worker

# ==========================================
# Worker Node 2
# ==========================================
- role: worker

# ==========================================
# Worker Node 3
# ==========================================
- role: worker
